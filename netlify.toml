[build]
  command = "npm run build"
  publish = "dist"

# Force www → apex : évite la double indexation www/non-www qui dilue l'autorité
# (canonicals pointent déjà vers https://bisrepetita.ch sans www)
[[redirects]]
  from = "https://www.bisrepetita.ch/*"
  to = "https://bisrepetita.ch/:splat"
  status = 301
  force = true

# Force trailing slash removal: /page/ → /page (301)
# Cohérent avec Astro trailingSlash: "never" et les canonicals
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301

[[redirects]]
  from = "/about"
  to = "/equipe/nicolas-de-boccard"
  status = 301

[[redirects]]
  from = "/nicolas-de-boccard"
  to = "/equipe/nicolas-de-boccard"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
